name = "echo-invoicing"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "DB"
database_name = "echo-invoicing"
database_id = "20cc51cc-ce47-4ce3-9297-cc5a399f0aa4"

[[kv_namespaces]]
binding = "CACHE"
id = "957a121d8c75428b866a46d2010aced8"

[[services]]
binding = "ENGINE_RUNTIME"
service = "echo-engine-runtime"

[[services]]
binding = "SHARED_BRAIN"
service = "echo-shared-brain"

[[services]]
binding = "EMAIL_SENDER"
service = "echo-email-sender"

[triggers]
crons = ["0 8 * * *"]

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "echo_metrics"
